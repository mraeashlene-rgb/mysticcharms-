<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Charms - Login</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    background: linear-gradient(135deg, #fff1f7 0%, #f8e8f0 100%);
    font-family: "Times New Roman", Arial, sans-serif;
    color: #333;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-container {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    max-width: 450px;
    width: 100%;
    padding: 50px 40px;
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
}

.logo-text {
    font-size: 32px;
    font-weight: bold;
    color: #3d0026;
    font-family: "Times New Roman";
    margin-bottom: 10px;
}

.tagline {
    font-size: 14px;
    color: #d63384;
    font-style: italic;
}

.login-title {
    font-size: 24px;
    font-weight: 600;
    color: #3d0026;
    margin-top: 30px;
    margin-bottom: 10px;
}

.login-subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 20px;
    position: relative;
}

label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #3d0026;
    margin-bottom: 8px;
    font-family: "Times New Roman";
}

input[type="email"],
input[type="tel"],
input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 14px;
    border: 2px solid #e9ecef;
    border-radius: 10px;
    font-size: 14px;
    font-family: "Times New Roman";
    transition: 0.3s;
}

input:focus {
    outline: none;
    border-color: #d63384;
    box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.1);
}

/* PASSWORD FIX */
.password-container {
    position: relative;
}

.password-container input {
    padding-right: 60px;
}

.password-eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 13px;
    color: #999;
    font-family: "Times New Roman";
}

.password-eye:hover {
    color: #d63384;
}

.form-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.form-tab {
    flex: 1;
    padding: 12px;
    border: 2px solid #e9ecef;
    background: white;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 500;
    color: #999;
    text-align: center;
    transition: 0.3s;
    font-family: "Times New Roman";
}

.form-tab.active {
    border-color: #d63384;
    color: #d63384;
    background: rgba(214, 51, 132, 0.05);
}

.input-group { display: none; }
.input-group.active { display: block; }

.login-btn {
    width: 100%;
    padding: 14px;
    background: #d63384;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    font-family: "Times New Roman";
    cursor: pointer;
    transition: 0.3s;
    margin-top: 20px;
}

.login-btn:hover {
    background: #b62a70;
    transform: translateY(-2px);
}

.error-message, .success-message {
    display: none;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
}

.error-message {
    background: #f8d7da;
    color: #721c24;
}

.success-message {
    background: #d4edda;
    color: #155724;
}

.show { display: block; }

.remember-checkbox {
    display: flex;
    align-items: center;
    margin: 15px 0;
    gap: 8px;
}

input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #d63384;
}

.signup-link {
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
}

.signup-link a {
    color: #d63384;
    text-decoration: none;
    font-weight: 600;
}

.signup-link a:hover { text-decoration: underline; }

/* ── RESPONSIVE MEDIA QUERIES ── */
@media (max-width: 1024px) {
    .login-container {
        padding: 45px 35px;
        max-width: 400px;
    }
    .logo-text { font-size: 28px; }
    .login-title { font-size: 22px; }
}

@media (max-width: 768px) {
    body { padding: 15px; }
    .login-container {
        padding: 40px 30px;
        max-width: 100%;
        border-radius: 16px;
    }
    .logo-text { font-size: 24px; margin-bottom: 8px; }
    .tagline { font-size: 13px; }
    .login-title { font-size: 20px; margin-top: 25px; }
    .login-subtitle { font-size: 13px; margin-bottom: 25px; }
    .form-group { margin-bottom: 18px; }
    label { font-size: 13px; margin-bottom: 6px; }
    input[type="email"],
    input[type="tel"],
    input[type="text"],
    input[type="password"] { padding: 12px; font-size: 13px; }
    .form-tabs { gap: 8px; margin-bottom: 18px; }
    .form-tab { padding: 10px; font-size: 13px; }
    .login-btn { padding: 12px; font-size: 15px; margin-top: 18px; }
    .remember-checkbox { margin: 12px 0; font-size: 13px; gap: 6px; }
    input[type="checkbox"] { width: 16px; height: 16px; }
    .signup-link { margin-top: 20px; font-size: 13px; }
    .error-message, .success-message { padding: 10px; font-size: 13px; margin-bottom: 18px; }
}

@media (max-width: 600px) {
    body { padding: 12px; }
    .login-container {
        padding: 30px 20px;
        max-width: 100%;
    }
    .login-header { margin-bottom: 30px; }
    .logo-text { font-size: 20px; margin-bottom: 6px; }
    .tagline { font-size: 12px; }
    .login-title { font-size: 18px; margin-top: 20px; margin-bottom: 8px; }
    .login-subtitle { font-size: 12px; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { font-size: 12px; margin-bottom: 5px; }
    input[type="email"],
    input[type="tel"],
    input[type="text"],
    input[type="password"] { padding: 11px; font-size: 12px; border-radius: 8px; }
    .form-tabs { gap: 6px; margin-bottom: 15px; }
    .form-tab { padding: 9px 8px; font-size: 12px; border-radius: 8px; }
    .login-btn { padding: 11px; font-size: 14px; margin-top: 15px; border-radius: 8px; }
    .remember-checkbox { margin: 10px 0; font-size: 12px; gap: 5px; }
    input[type="checkbox"] { width: 15px; height: 15px; }
    .signup-link { margin-top: 18px; font-size: 12px; }
    .error-message, .success-message { padding: 8px; font-size: 12px; margin-bottom: 15px; border-radius: 6px; }
    .password-eye { font-size: 12px; right: 10px; }
}

@media (max-width: 480px) {
    body { padding: 10px; }
    .login-container {
        padding: 25px 16px;
        border-radius: 14px;
    }
    .login-header { margin-bottom: 25px; }
    .logo-text { font-size: 18px; margin-bottom: 5px; }
    .tagline { font-size: 11px; }
    .login-title { font-size: 16px; margin-top: 18px; margin-bottom: 6px; }
    .login-subtitle { font-size: 11px; margin-bottom: 18px; }
    .form-group { margin-bottom: 12px; }
    label { font-size: 11px; margin-bottom: 4px; }
    input[type="email"],
    input[type="tel"],
    input[type="text"],
    input[type="password"] { padding: 10px; font-size: 11px; border-radius: 7px; }
    .form-tabs { gap: 5px; margin-bottom: 12px; }
    .form-tab { padding: 8px 6px; font-size: 11px; border-radius: 7px; }
    .login-btn { padding: 10px; font-size: 13px; margin-top: 12px; border-radius: 7px; }
    .remember-checkbox { margin: 8px 0; font-size: 11px; gap: 4px; }
    input[type="checkbox"] { width: 14px; height: 14px; }
    .signup-link { margin-top: 15px; font-size: 11px; }
    .error-message, .success-message { padding: 7px; font-size: 11px; margin-bottom: 12px; border-radius: 5px; }
}

@media (max-height: 500px) and (orientation: landscape) {
    .login-container { padding: 30px 25px; }
    .login-header { margin-bottom: 20px; }
    .logo-text { font-size: 22px; margin-bottom: 5px; }
    .login-title { font-size: 18px; margin-top: 15px; }
    .login-subtitle { font-size: 12px; margin-bottom: 15px; }
    .form-group { margin-bottom: 10px; }
    label { font-size: 12px; margin-bottom: 4px; }
    input[type="email"],
    input[type="tel"],
    input[type="text"],
    input[type="password"] { padding: 10px; font-size: 12px; }
    .form-tabs { margin-bottom: 10px; }
    .login-btn { padding: 10px; font-size: 14px; margin-top: 10px; }
    .signup-link { margin-top: 12px; font-size: 11px; }
}
</style>
</head>

<body>

<div class="login-container">
    <div class="login-header">
        <div class="logo-text">♡ MYSTIC CHARMS</div>
        <div class="tagline">Designed with quiet charm ♥</div>
    </div>

    <div class="login-title">Welcome</div>
    <div class="login-subtitle">Sign in to your account to continue shopping</div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm">

        <div class="form-tabs">
            <button type="button" class="form-tab active" onclick="switchTab('email')">Email</button>
            <button type="button" class="form-tab" onclick="switchTab('mobile')">Mobile Number</button>
        </div>

        <div id="emailGroup" class="input-group active">
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" placeholder="example@email.com">
            </div>
        </div>

        <div id="mobileGroup" class="input-group">
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" id="mobile" placeholder="09xxxxxxxxx">
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
            <label>Password *</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="Enter your password" required>
                <span class="password-eye" id="passwordEye" onclick="togglePassword()">Show</span>
            </div>
        </div>

        <div class="remember-checkbox">
            <input type="checkbox" id="rememberMe">
            <label>Remember me</label>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="signup-link">
        Don't have an account? <a href="signup.html">Create one</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCDNdTMCcFZEts9nYT0ILUeN_v7YY09380",
    authDomain: "mywebsite-829b5.firebaseapp.com",
    projectId: "mywebsite-829b5",
    storageBucket: "mywebsite-829b5.appspot.com",
    messagingSenderId: "322237844842",
    appId: "1:322237844842:web:eee18bf1c0f08fd748a913",
    databaseURL: "https://mywebsite-829b5-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let activeTab = 'email';

function switchTab(type) {
    activeTab = type;
    document.querySelectorAll('.form-tab').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.input-group').forEach(group => group.classList.remove('active'));
    document.querySelector(`button[onclick="switchTab('${type}')"]`).classList.add('active');
    document.getElementById(`${type}Group`).classList.add('active');
}

function togglePassword() {
    const input = document.getElementById('password');
    const eye = document.getElementById('passwordEye');
    if (input.type === 'password') {
        input.type = 'text';
        eye.textContent = 'Hide';
    } else {
        input.type = 'password';
        eye.textContent = 'Show';
    }
}

window.switchTab = switchTab;
window.togglePassword = togglePassword;

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const identifier = activeTab === 'email' ? document.getElementById("email").value.trim() : document.getElementById("mobile").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!identifier || !password) {
        alert("Please fill in all fields.");
        return;
    }

    try {
        const snapshot = await get(ref(db, "users"));

        if (!snapshot.exists()) {
            alert("No users registered.");
            return;
        }

        const users = snapshot.val();

        const entry = Object.entries(users).find(([key, user]) =>
            (activeTab === 'email' ? user.email === identifier : user.mobile === identifier) && user.password === password
        );

        if (!entry) {
            alert("Invalid credentials.");
            return;
        }

        const [id, user] = entry;

        // Save session
        localStorage.setItem("userLogin", JSON.stringify({
            ...user,
            id,
            userId: id,
            mobile: user.mobile ?? user.phone ?? ""
        }));

        // 🔥 ROLE CHECK (IMPORTANT PART)
        const role = user.role || "user";

        if (role === "admin") {
            window.location.href = "index.html";
        } else {
            window.location.href = "index.html";
        }

    } catch (error) {
        console.error(error);
        alert("Login failed. Try again.");
    }
});
</script>
</body>
</html>
